name: Validate Plugin

on:
  push:
    branches: [main, develop]
    paths:
      - '.claude-plugin/**'
      - 'skills/**'
      - 'commands/**'
      - 'agents/**'
  pull_request:
    paths:
      - '.claude-plugin/**'
      - 'skills/**'
      - 'commands/**'
      - 'agents/**'

permissions:
  contents: read

jobs:
  validate-plugin-json:
    name: Validate plugin.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check plugin.json exists
        run: |
          if [ ! -f ".claude-plugin/plugin.json" ]; then
            echo "ERROR: .claude-plugin/plugin.json not found"
            exit 1
          fi
          echo "OK: .claude-plugin/plugin.json exists"

      - name: Validate JSON syntax
        run: |
          if ! jq empty .claude-plugin/plugin.json 2>/dev/null; then
            echo "ERROR: .claude-plugin/plugin.json is not valid JSON"
            exit 1
          fi
          echo "OK: valid JSON"

      - name: Check required fields
        run: |
          ERRORS=0

          NAME=$(jq -r '.name // empty' .claude-plugin/plugin.json)
          if [ -z "$NAME" ]; then
            echo "ERROR: missing required field: name"
            ERRORS=$((ERRORS + 1))
          else
            echo "OK: name = $NAME"
          fi

          VERSION=$(jq -r '.version // empty' .claude-plugin/plugin.json)
          if [ -z "$VERSION" ]; then
            echo "ERROR: missing required field: version"
            ERRORS=$((ERRORS + 1))
          else
            echo "OK: version = $VERSION"
          fi

          DESCRIPTION=$(jq -r '.description // empty' .claude-plugin/plugin.json)
          if [ -z "$DESCRIPTION" ]; then
            echo "ERROR: missing required field: description"
            ERRORS=$((ERRORS + 1))
          else
            echo "OK: description present"
          fi

          if [ "$ERRORS" -gt 0 ]; then
            echo "FAILED: $ERRORS required field(s) missing"
            exit 1
          fi

  validate-components:
    name: Validate component files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # xgh: skills at repo root skills/<name>/SKILL.md
      - name: Validate skills (skills/<name>/SKILL.md)
        run: |
          ERRORS=0
          if [ -d "skills" ]; then
            for skill_dir in skills/*/; do
              skill_name=$(basename "$skill_dir")
              # Skip _shared and other non-skill dirs that don't follow the pattern
              if [ ! -f "$skill_dir/SKILL.md" ]; then
                echo "ERROR: skills/$skill_name/SKILL.md not found"
                ERRORS=$((ERRORS + 1))
              else
                echo "OK: skills/$skill_name/SKILL.md"
              fi
            done
          else
            echo "INFO: no skills/ directory"
          fi
          if [ "$ERRORS" -gt 0 ]; then
            echo "FAILED: $ERRORS skill(s) missing SKILL.md"
            exit 1
          fi

      # xgh: commands at repo root commands/<name>.md
      - name: Validate commands (commands/<name>.md)
        run: |
          ERRORS=0
          if [ -d "commands" ]; then
            for cmd_file in commands/*.md; do
              [ -e "$cmd_file" ] || continue
              cmd_name=$(basename "$cmd_file")
              if [ ! -f "$cmd_file" ]; then
                echo "ERROR: commands/$cmd_name is not a file"
                ERRORS=$((ERRORS + 1))
              else
                echo "OK: commands/$cmd_name"
              fi
            done
          else
            echo "INFO: no commands/ directory"
          fi
          if [ "$ERRORS" -gt 0 ]; then
            echo "FAILED: $ERRORS command file(s) invalid"
            exit 1
          fi

      # xgh: agents at repo root agents/<name>.md
      - name: Validate agents (agents/<name>.md)
        run: |
          ERRORS=0
          if [ -d "agents" ]; then
            for agent_file in agents/*.md; do
              [ -e "$agent_file" ] || continue
              agent_name=$(basename "$agent_file")
              if [ ! -f "$agent_file" ]; then
                echo "ERROR: agents/$agent_name is not a file"
                ERRORS=$((ERRORS + 1))
              else
                echo "OK: agents/$agent_name"
              fi
            done
          else
            echo "INFO: no agents/ directory"
          fi
          if [ "$ERRORS" -gt 0 ]; then
            echo "FAILED: $ERRORS agent file(s) invalid"
            exit 1
          fi

  validate-structure:
    name: Validate directory structure (anti-pattern check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure commands/ and skills/ are NOT nested inside .claude-plugin/
        run: |
          ERRORS=0

          # xgh: skills/, commands/, agents/ all live at repo root — NOT inside .claude-plugin/
          if [ -d ".claude-plugin/skills" ]; then
            echo "ERROR: skills/ is nested inside .claude-plugin/ — anti-pattern"
            echo "  Skills must live at repo root: skills/<name>/SKILL.md"
            ERRORS=$((ERRORS + 1))
          else
            echo "OK: no skills/ nested inside .claude-plugin/"
          fi

          if [ -d ".claude-plugin/commands" ]; then
            echo "ERROR: commands/ is nested inside .claude-plugin/ — anti-pattern"
            echo "  Commands must live at repo root: commands/<name>.md"
            ERRORS=$((ERRORS + 1))
          else
            echo "OK: no commands/ nested inside .claude-plugin/"
          fi

          if [ -d ".claude-plugin/agents" ]; then
            echo "ERROR: agents/ is nested inside .claude-plugin/ — anti-pattern"
            echo "  Agents must live at repo root: agents/<name>.md"
            ERRORS=$((ERRORS + 1))
          else
            echo "OK: no agents/ nested inside .claude-plugin/"
          fi

          # Check for SKILL.md files accidentally nested inside .claude-plugin/
          if find .claude-plugin -name "SKILL.md" 2>/dev/null | grep -q .; then
            echo "ERROR: SKILL.md files found inside .claude-plugin/ — anti-pattern"
            find .claude-plugin -name "SKILL.md"
            ERRORS=$((ERRORS + 1))
          else
            echo "OK: no SKILL.md nested inside .claude-plugin/"
          fi

          if [ "$ERRORS" -gt 0 ]; then
            echo "FAILED: $ERRORS structural issue(s) found"
            exit 1
          fi
