<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>xgh — Claude on the fastlane</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* %%CSS_VARS%% */
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      font-family: 'JetBrains Mono', monospace;
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Hero ── */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4rem 2rem 2rem;
      min-height: 100vh;
      justify-content: center;
    }

    .hero-tagline {
      font-size: clamp(1.2rem, 3vw, 2rem);
      font-weight: 700;
      color: var(--text-bright);
      margin-bottom: 2rem;
      text-align: center;
      letter-spacing: -0.02em;
    }

    .hero-tui {
      width: 100%;
      max-width: 900px;
      margin-bottom: 3rem;
    }

    .scroll-hint {
      color: var(--text-muted);
      font-size: 12px;
      animation: bob 2s ease-in-out infinite;
    }
    @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(6px); } }

    /* ── Features ── */
    .features {
      max-width: 900px;
      margin: 0 auto;
      padding: 4rem 2rem;
    }

    .features-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
    }

    @media (max-width: 768px) {
      .features-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 480px) {
      .features-grid { grid-template-columns: 1fr; }
    }

    .feature-card {
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px;
      padding: 1.25rem;
      background: rgba(255,255,255,0.02);
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .feature-card.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .feature-icon { font-size: 1.5rem; margin-bottom: 0.5rem; }
    .feature-headline {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-bright);
      margin-bottom: 0.35rem;
    }
    .feature-desc {
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.5;
    }

    /* ── Install ── */
    .install {
      max-width: 900px;
      margin: 0 auto;
      padding: 4rem 2rem;
    }

    .install-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-bright);
      margin-bottom: 1.5rem;
    }

    .install-steps {
      list-style: none;
      counter-reset: step;
    }
    .install-step {
      counter-increment: step;
      margin-bottom: 1.25rem;
      font-size: 13px;
    }
    .install-step::before {
      content: counter(step) ".";
      color: var(--accent);
      font-weight: 700;
      margin-right: 0.5rem;
    }
    .install-label { color: var(--text-dim); }
    .install-cmd {
      display: block;
      margin-top: 0.35rem;
      padding: 0.4rem 0.75rem;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 4px;
      color: var(--blue);
      font-size: 13px;
      width: fit-content;
    }

    .install-alt {
      margin-top: 1.5rem;
      font-size: 12px;
      color: var(--text-dim);
    }
    .install-alt code { color: var(--blue); }

    /* ── Footer ── */
    .footer {
      max-width: 900px;
      margin: 0 auto;
      padding: 3rem 2rem;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: var(--text-muted);
    }
    .footer a {
      color: var(--text-dim);
      text-decoration: none;
      transition: color 0.15s ease;
    }
    .footer a:hover { color: var(--accent); }
    .footer-links { display: flex; gap: 1.5rem; }
  </style>
</head>
<body>

<!-- ── Hero ── -->
<section class="hero">
  <h1 class="hero-tagline">Your AI rides faster.</h1>
  <div class="hero-tui">
    <!-- %%TUI_EMBED%% -->
  </div>
  <div class="scroll-hint">↓ scroll</div>
</section>

<!-- ── Features ── -->
<section class="features">
  <div class="features-grid">
    <!-- %%FEATURES%% -->
  </div>
</section>

<!-- ── Install ── -->
<section class="install" id="install">
  <h2 class="install-title">Get started</h2>
  <!-- %%INSTALL%% -->
</section>

<!-- ── Footer ── -->
<footer class="footer">
  <span>xgh: Claude on the fastlane.</span>
  <div class="footer-links">
    <a href="https://github.com/extreme-go-horse/xgh" target="_blank">GitHub</a>
    <a href="https://www.npmjs.com/package/@extreme-go-horse/xgh" target="_blank">npm</a>
  </div>
</footer>

<!-- ── Scroll animation ── -->
<script>
const observer = new IntersectionObserver((entries) => {
  entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: 0.1 });
document.querySelectorAll('.feature-card').forEach(c => observer.observe(c));
</script>

</body>
</html>
